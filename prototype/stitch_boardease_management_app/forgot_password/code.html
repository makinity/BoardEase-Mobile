<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">
<!-- Shell Visibility: Suppressed for Transactional screen (Login/Reset) -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl relative overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-80 h-80 bg-secondary-container/10 rounded-full blur-3xl"></div>
<div class="w-full max-w-md z-10">
<!-- Logo Branding -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/10 transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="domain">domain</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">BoardEase</h1>
</div>
<!-- Reset Password Card -->
<div class="bg-surface-container-lowest p-lg rounded-xl shadow-[0_1px_3px_rgba(0,0,0,0.1),0_4px_6px_rgba(0,0,0,0.05)] border border-outline-variant">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Reset Password</h2>
<p class="font-body-md text-on-surface-variant">Enter your email to receive a reset link.</p>
</div>
<form class="space-y-lg" id="resetForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline/50" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3.5 bg-primary text-on-primary font-title-lg text-title-lg rounded-lg shadow-md shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Back to Login -->
<div class="mt-xl text-center">
<a class="inline-flex items-center gap-1 font-label-md text-label-md text-primary hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
<span>Back to login</span>
</a>
</div>
</div>
<!-- Trust Indicator -->
<p class="mt-xl text-center font-label-sm text-label-sm text-outline px-md">
        Secured by BoardEase Identity Services. If you don't receive an email within 5 minutes, please check your spam folder.
      </p>
</div>
</main>
<script>
    // Micro-interaction for form submission
    document.getElementById('resetForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const button = e.target.querySelector('button');
      const originalContent = button.innerHTML;
      
      // Loading State
      button.disabled = true;
      button.classList.add('opacity-80');
      button.innerHTML = `
        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Sending...</span>
      `;

      // Simulate API call
      setTimeout(() => {
        button.classList.remove('bg-primary');
        button.classList.add('bg-secondary');
        button.innerHTML = `
          <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
          <span>Email Sent!</span>
        `;
        
        // Form field feedback
        const emailInput = document.getElementById('email');
        emailInput.disabled = true;
        emailInput.classList.add('bg-surface-container-low', 'border-secondary/30');
      }, 1500);
    });
  </script>
</body></html>
