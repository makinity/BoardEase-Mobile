<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-high": "#dbe9ff",
            "on-background": "#011d35",
            "on-tertiary-fixed-variant": "#5f4100",
            "surface-bright": "#f8f9ff",
            "primary": "#005ea1",
            "surface-container-lowest": "#ffffff",
            "secondary-fixed": "#91f8b8",
            "outline": "#717782",
            "surface-container-low": "#eef4ff",
            "error": "#ba1a1a",
            "on-tertiary-container": "#fffbff",
            "on-tertiary": "#ffffff",
            "secondary": "#006d40",
            "on-error": "#ffffff",
            "tertiary": "#7a5500",
            "inverse-primary": "#9fcaff",
            "on-secondary-fixed-variant": "#00522f",
            "surface-container": "#e4efff",
            "tertiary-fixed-dim": "#f8bc4b",
            "on-error-container": "#93000a",
            "on-primary": "#ffffff",
            "inverse-on-surface": "#e9f1ff",
            "tertiary-container": "#996c00",
            "surface-dim": "#c4dcfd",
            "background": "#f8f9ff",
            "surface-variant": "#d1e4ff",
            "on-secondary-fixed": "#002110",
            "tertiary-fixed": "#ffdeaa",
            "on-primary-fixed": "#001d37",
            "secondary-container": "#8ef5b5",
            "surface": "#f8f9ff",
            "primary-fixed": "#d2e4ff",
            "primary-fixed-dim": "#9fcaff",
            "on-surface": "#011d35",
            "surface-tint": "#0061a5",
            "on-surface-variant": "#414751",
            "error-container": "#ffdad6",
            "on-secondary": "#ffffff",
            "surface-container-highest": "#d1e4ff",
            "primary-container": "#2178c3",
            "inverse-surface": "#19324b",
            "on-primary-fixed-variant": "#00497e",
            "outline-variant": "#c0c7d3",
            "secondary-fixed-dim": "#74db9d",
            "on-tertiary-fixed": "#271900",
            "on-primary-container": "#fdfcff",
            "on-secondary-container": "#007243"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "xs": "4px",
            "margin-mobile": "16px",
            "margin-desktop": "40px",
            "md": "16px",
            "base": "4px",
            "lg": "24px",
            "gutter": "16px",
            "sm": "8px",
            "xl": "32px"
          },
          "fontFamily": {
            "headline-lg-mobile": ["Inter"],
            "label-md": ["Inter"],
            "label-sm": ["Inter"],
            "body-lg": ["Inter"],
            "body-md": ["Inter"],
            "title-lg": ["Inter"],
            "display": ["Inter"],
            "headline-lg": ["Inter"],
            "headline-md": ["Inter"]
          }
        }
      }
    }
  </script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Suppression of Nav Shell per Destination Rule: Onboarding/Registration priority -->
<main class="flex-grow flex flex-col px-margin-mobile pt-12 pb-8 max-w-md mx-auto w-full">
<!-- Hero / Branding Section -->
<div class="mb-xl text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container mb-lg">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="domain">domain</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Occupant registration</p>
</div>
<!-- Form Section -->
<form class="space-y-lg flex-grow" onsubmit="event.preventDefault();">
<!-- Full Name Input -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="name">Full name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant/60" id="name" placeholder="Juan Dela Cruz" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant/60" id="email" placeholder="email@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant/60" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Agreement Note -->
<p class="font-label-sm text-label-sm text-on-surface-variant text-center px-4 leading-relaxed">
        By creating an account, you agree to our <span class="text-primary font-semibold">Terms of Service</span> and <span class="text-primary font-semibold">Privacy Policy</span>.
      </p>
<!-- Primary Action -->
<div class="pt-md">
<button class="w-full h-14 bg-primary text-on-primary font-title-lg text-title-lg rounded-lg shadow-sm hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2">
          Register
          <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-xl pb-md text-center">
<a class="font-body-md text-body-md text-on-surface-variant" href="#">
        Already have an account? <span class="text-primary font-semibold">Sign in</span>
</a>
</div>
</main>
<!-- Visual Background Element (Subtle) -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/20 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-80 h-80 bg-secondary-container/10 rounded-full blur-[100px] translate-y-1/2 -translate-x-1/4"></div>
<script>
    // Lightweight interaction for password visibility toggle
    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.querySelector('button[type="button"]');
      const passInput = document.getElementById('password');
      const icon = toggleBtn.querySelector('.material-symbols-outlined');

      toggleBtn.addEventListener('click', () => {
        const isSecret = passInput.type === 'password';
        passInput.type = isSecret ? 'text' : 'password';
        icon.textContent = isSecret ? 'visibility_off' : 'visibility';
      });

      // Simple click animation for inputs
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.classList.add('scale-[1.01]');
        });
        input.addEventListener('blur', () => {
          input.parentElement.classList.remove('scale-[1.01]');
        });
      });
    });
  </script>
</body></html>
