<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>New Password - BoardEase</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbars for a clean mobile app feel */
    ::-webkit-scrollbar {
      display: none;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-container-high": "#dbe9ff",
                  "on-background": "#011d35",
                  "on-tertiary-fixed-variant": "#5f4100",
                  "surface-bright": "#f8f9ff",
                  "primary": "#005ea1",
                  "surface-container-lowest": "#ffffff",
                  "secondary-fixed": "#91f8b8",
                  "outline": "#717782",
                  "surface-container-low": "#eef4ff",
                  "error": "#ba1a1a",
                  "on-tertiary-container": "#fffbff",
                  "on-tertiary": "#ffffff",
                  "secondary": "#006d40",
                  "on-error": "#ffffff",
                  "tertiary": "#7a5500",
                  "inverse-primary": "#9fcaff",
                  "on-secondary-fixed-variant": "#00522f",
                  "surface-container": "#e4efff",
                  "tertiary-fixed-dim": "#f8bc4b",
                  "on-error-container": "#93000a",
                  "on-primary": "#ffffff",
                  "inverse-on-surface": "#e9f1ff",
                  "tertiary-container": "#996c00",
                  "surface-dim": "#c4dcfd",
                  "background": "#f8f9ff",
                  "surface-variant": "#d1e4ff",
                  "on-secondary-fixed": "#002110",
                  "tertiary-fixed": "#ffdeaa",
                  "on-primary-fixed": "#001d37",
                  "secondary-container": "#8ef5b5",
                  "surface": "#f8f9ff",
                  "primary-fixed": "#d2e4ff",
                  "primary-fixed-dim": "#9fcaff",
                  "on-surface": "#011d35",
                  "surface-tint": "#0061a5",
                  "on-surface-variant": "#414751",
                  "error-container": "#ffdad6",
                  "on-secondary": "#ffffff",
                  "surface-container-highest": "#d1e4ff",
                  "primary-container": "#2178c3",
                  "inverse-surface": "#19324b",
                  "on-primary-fixed-variant": "#00497e",
                  "outline-variant": "#c0c7d3",
                  "secondary-fixed-dim": "#74db9d",
                  "on-tertiary-fixed": "#271900",
                  "on-primary-container": "#fdfcff",
                  "on-secondary-container": "#007243"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "xs": "4px",
                  "margin-mobile": "16px",
                  "margin-desktop": "40px",
                  "md": "16px",
                  "base": "4px",
                  "lg": "24px",
                  "gutter": "16px",
                  "sm": "8px",
                  "xl": "32px"
          },
          "fontFamily": {
                  "headline-lg-mobile": ["Inter"],
                  "label-md": ["Inter"],
                  "label-sm": ["Inter"],
                  "body-lg": ["Inter"],
                  "body-md": ["Inter"],
                  "title-lg": ["Inter"],
                  "display": ["Inter"],
                  "headline-lg": ["Inter"],
                  "headline-md": ["Inter"]
          },
          "fontSize": {
                  "headline-lg-mobile": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                  "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                  "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                  "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                  "display": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                  "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Main Canvas -->
<main class="w-full max-w-md min-h-screen flex flex-col px-margin-mobile relative overflow-hidden">
<!-- Decorative Background Element (Subtle Gradient) -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<!-- Header Section -->
<header class="pt-12 pb-8 flex flex-col items-start z-10">
<button aria-label="Go back" class="mb-8 w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="space-y-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">New Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">
          Please create a secure password that you haven't used before.
        </p>
</div>
</header>
<!-- Reset Password Form -->
<section class="flex-grow z-10">
<form class="space-y-6" id="resetForm">
<!-- New Password Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface ml-1" for="new_password">New password</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="new_password" placeholder="Enter your new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" onclick="togglePassword('new_password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye_new_password">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface ml-1" for="confirm_password">Confirm password</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock_reset">lock_reset</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="confirm_password" placeholder="Confirm your new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye_confirm_password">visibility</span>
</button>
</div>
</div>
<!-- Password Strength Indicators (Visual Polish) -->
<div class="px-1 pt-2">
<div class="flex gap-2 mb-3">
<div class="h-1 flex-1 rounded-full bg-primary transition-all duration-500"></div>
<div class="h-1 flex-1 rounded-full bg-primary transition-all duration-500"></div>
<div class="h-1 flex-1 rounded-full bg-outline-variant transition-all duration-500"></div>
<div class="h-1 flex-1 rounded-full bg-outline-variant transition-all duration-500"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Strong passwords contain at least 8 characters including letters and numbers.</p>
</div>
</form>
</section>
<!-- Bottom Actions Area -->
<footer class="mt-auto pb-12 z-10">
<button class="w-full h-14 bg-primary text-on-primary font-title-lg text-title-lg rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 group overflow-hidden relative" form="resetForm" type="submit">
<span class="relative z-10">Update Password</span>
<span class="material-symbols-outlined relative z-10 group-hover:translate-x-1 transition-transform" data-icon="check_circle">check_circle</span>
<!-- Subtle shimmer effect -->
<div class="absolute inset-0 bg-white/10 -translate-x-full group-active:translate-x-0 transition-transform duration-300"></div>
</button>
</footer>
<!-- Informational Card (Bento Style micro-element) -->
<div class="mb-8 z-10">
<div class="p-4 rounded-xl bg-surface-container-high/40 border border-surface-container-highest flex gap-4 items-center">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="security">security</span>
</div>
<div>
<h4 class="font-label-md text-label-md text-on-background">Secure Session</h4>
<p class="font-label-sm text-label-sm text-on-surface-variant">Changing your password will log you out of all other active devices.</p>
</div>
</div>
</div>
</main>
<script>
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById('eye_' + inputId);
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerText = 'visibility_off';
      } else {
        input.type = 'password';
        icon.innerText = 'visibility';
      }
    }

    // Add a simple form submission animation/handling
    document.getElementById('resetForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Updating...';
      
      // Simulate API call
      setTimeout(() => {
        btn.innerHTML = '<span class="material-symbols-outlined" data-icon="done_all">done_all</span> Password Updated';
        btn.classList.replace('bg-primary', 'bg-secondary');
        
        // Reset after 2 seconds for demo
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = originalText;
          btn.classList.replace('bg-secondary', 'bg-primary');
        }, 2000);
      }, 1500);
    });
  </script>
</body></html>
